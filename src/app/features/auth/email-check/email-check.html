<div class="flex flex-col gap-6 animate-fade-in max-w-md mx-auto py-4" *transloco="let t">
  <div class="text-center space-y-2">
    <h1
      class="text-xl font-bold tracking-tight text-brand-primary leading-tight lowercase first-letter:uppercase"
    >
      {{ t('auth.title') }}
    </h1>
    <p class="text-xs text-brand-muted">{{ t('auth.subtitle') }}</p>
  </div>

  <form class="flex flex-col gap-2">
    <mat-form-field appearance="outline" class="w-full custom-field">
      <mat-label>{{ t('auth.email_label') }}</mat-label>
      <input
        matInput
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="baby@example.com"
        #emailInput="ngModel"
        required
        email
        class="dir-ltr"
      />
      @if (emailInput.invalid && emailInput.touched) {
        <mat-error class="text-[10px] font-bold uppercase tracking-tighter">
          Please enter a valid email
        </mat-error>
      }
    </mat-form-field>

    <button
      type="submit"
      class="w-full py-4 mt-2 rounded-full bg-brand-primary text-white font-black text-xs uppercase tracking-[0.2em] transition-all duration-300 hover:bg-brand-primary-light active:scale-[0.98] shadow-lg shadow-brand-primary/20 disabled:opacity-50 disabled:grayscale"
      (click)="onContinue()"
      [disabled]="!isValidEmail() || authStore.isLoading()"
    >
      @if (authStore.isLoading()) {
        <div class="flex items-center justify-center gap-3">
          <div
            class="w-4 h-4 border-2 border-white/20 border-t-white rounded-full animate-spin"
          ></div>
          <span class="animate-pulse">{{ t('auth.checking') }}</span>
        </div>
      } @else {
        {{ t('auth.continue') }}
      }
    </button>
  </form>

  <div class="relative flex py-2 items-center">
    <div class="flex-grow border-t border-brand-surface/50"></div>
    <span
      class="flex-shrink mx-4 text-brand-muted text-[10px] font-black tracking-[0.3em] uppercase"
    >
      {{ t('auth.or') }}
    </span>
    <div class="flex-grow border-t border-brand-surface/50"></div>
  </div>

  <div class="flex flex-col gap-3">
    <button type="button" class="social-btn group">
      <fa-icon
        [icon]="icons.google"
        class="text-lg group-hover:text-[#DB4437] transition-colors"
      ></fa-icon>
      <span>{{ t('auth.google') }}</span>
    </button>

    <button type="button" class="social-btn group">
      <fa-icon
        [icon]="icons.apple"
        class="text-xl text-brand-primary transition-transform group-hover:scale-110"
      ></fa-icon>
      <span>{{ t('auth.apple') }}</span>
    </button>
  </div>

  <p
    class="text-[9px] text-center text-brand-muted px-8 leading-relaxed uppercase tracking-widest opacity-70 mt-2"
  >
    {{ t('auth.terms_prefix') }}
    <a href="#" class="underline font-bold hover:text-brand-primary">{{ t('auth.terms_link') }}</a>
    {{ t('auth.and') }}
    <a href="#" class="underline font-bold hover:text-brand-primary">{{ t('auth.privacy_link') }}</a
    >.
  </p>
</div>
