<a
  [routerLink]="['/shop']"
  [queryParams]="{ category: category.slug }"
  class="group block flex flex-col items-center gap-4 transition-all duration-500"
>
  <!-- Image Wrapper: Circular & Minimal -->
  <div class="relative aspect-square w-full max-w-[140px] overflow-hidden rounded-full border border-brand-primary/5 bg-brand-bg-light shadow-sm transition-all duration-700 group-hover:scale-105 group-hover:shadow-xl group-hover:shadow-brand-primary/10">
    <img
      [src]="category.icon"
      [alt]="category[activeLang()].title"
      class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-110"
      loading="lazy"
    />
    <!-- Subtle Layer -->
    <div class="absolute inset-0 bg-brand-primary/0 transition-colors duration-500 group-hover:bg-brand-primary/5"></div>
  </div>

  <!-- Label: Premium Typography -->
  <div class="text-center">
    <h3 class="text-[10px] font-black uppercase tracking-[0.25em] text-brand-primary transition-colors duration-300 group-hover:text-brand-accent">
      {{ category[activeLang()].title }}
    </h3>
    <div class="mx-auto mt-1.5 h-[1.5px] w-0 bg-brand-accent transition-all duration-500 group-hover:w-full"></div>
  </div>
</a>
